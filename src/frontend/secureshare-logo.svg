<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" role="img" aria-labelledby="logo-title">
  <title id="logo-title">SecureShare</title>
  <defs>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#293373"/>
      <stop offset="100%" style="stop-color:#3B4A9E"/>
    </linearGradient>
  </defs>

  <!-- Shield + Lock icon -->
  <g id="icon">
    <path d="M14 2 L28 7 L28 19 C28 27 22 33 14 36 C6 33 0 27 0 19 L0 7 Z" fill="url(#shield-grad)"/>
    <rect x="7" y="16" width="14" height="10" rx="2" fill="#F36F3A"/>
    <path d="M10 16V13a4 4 0 0 1 8 0v3" fill="none" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="14" cy="20.5" r="1.2" fill="#293373"/>
    <rect x="13.4" y="21.5" width="1.2" height="2" rx="0.4" fill="#293373"/>
  </g>

  <!-- Wordmark -->
  <text x="36" y="26" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="24" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#293373">Secure</tspan><tspan fill="#F36F3A">Share</tspan>
  </text>
</svg>
