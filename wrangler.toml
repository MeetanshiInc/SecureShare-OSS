name = "secureshare"
main = "src/worker/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"

[dev]
port = 8787
local_protocol = "http"
ip = "localhost"

[[kv_namespaces]]
binding = "SECRETS_KV"
id = "your-kv-namespace-id"
preview_id = "your-kv-namespace-id"

# Static assets served automatically by Wrangler v4
[assets]
directory = "./dist/frontend"
binding = "ASSETS"
